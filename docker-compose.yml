version: "3.9"

services:

  # =====================================
  # EXPRESS API
  # =====================================
  api:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: fuel-api

    restart: unless-stopped


    env_file:
      - .env.production


    expose:
      - "8080"



    depends_on:

      postgres:
        condition: service_healthy



    healthcheck:

      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8080/health"
        ]

      interval: 30s

      timeout: 10s

      retries: 3



    networks:

      - backend





  # =====================================
  # POSTGRES DATABASE
  # =====================================
  postgres:

    image: postgres:16


    container_name: fuel-postgres


    restart: unless-stopped



    environment:

      POSTGRES_USER: ${POSTGRES_USER}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      POSTGRES_DB: ${POSTGRES_DB}


      TZ: Africa/Addis_Ababa



    volumes:

      - postgres_data:/var/lib/postgresql/data



    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]

      interval: 10s

      timeout: 5s

      retries: 5



    networks:

      - backend





  # =====================================
  # NGINX REVERSE PROXY
  # =====================================
  nginx:

    image: nginx:alpine


    container_name: fuel-nginx


    restart: unless-stopped



    ports:

      - "80:80"



    volumes:

      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro



    depends_on:

      api:

        condition: service_healthy



    networks:

      - backend





# =====================================
# STORAGE
# =====================================
volumes:

  postgres_data:





# =====================================
# NETWORK
# =====================================
networks:

  backend:

    driver: bridge