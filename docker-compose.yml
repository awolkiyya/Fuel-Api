services:

  # =====================================
  # EXPRESS API
  # =====================================
  api:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: fuel-api

    restart: unless-stopped

    env_file:
      - .env.production

    expose:
      - "8080"

    depends_on:
      postgres:
        condition: service_healthy


    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]

      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s


    networks:
      - backend





  # =====================================
  # POSTGRES DATABASE
  # =====================================
  postgres:

    image: postgres:16


    container_name: fuel-postgres


    restart: unless-stopped


    environment:

      POSTGRES_USER: ${POSTGRES_USER}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      POSTGRES_DB: ${POSTGRES_DB}

      TZ: Africa/Addis_Ababa


    volumes:

      - postgres_data:/var/lib/postgresql/data


    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]

      interval: 10s

      timeout: 5s

      retries: 5

      start_period: 20s


    networks:

      - backend





  # =====================================
  # NGINX REVERSE PROXY
  # =====================================
  nginx:

    image: nginx:alpine


    container_name: fuel-nginx


    restart: unless-stopped


    ports:

      - "80:80"


    volumes:

      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro


    depends_on:

      api:

        condition: service_healthy


    networks:

      - backend





  # =====================================
  # PRISMA STUDIO (OPTIONAL ADMIN TOOL)
  # Run only when needed:
  #
  # docker compose --profile tools up prisma-studio
  #
  # Access:
  # http://SERVER_IP:5555
  # =====================================
  prisma-studio:

    image: node:20-slim


    container_name: fuel-prisma-studio


    working_dir: /app


    volumes:

      - .:/app


    env_file:

      - .env.production


    command:

      sh -c "
      npm install &&
      npx prisma studio --hostname 0.0.0.0
      "


    ports:

      - "5555:5555"


    depends_on:

      postgres:

        condition: service_healthy


    networks:

      - backend


    profiles:

      - tools





# =====================================
# STORAGE
# =====================================
volumes:

  postgres_data:





# =====================================
# NETWORK
# =====================================
networks:

  backend:

    driver: bridge